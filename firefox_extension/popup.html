<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 12px;
      padding: 12px;
      margin: 0;
      width: 380px;
      max-height: 500px;
      overflow-y: auto;
    }
    h1 {
      color: #9b59b6;
      font-size: 14px;
      margin: 0 0 10px 0;
    }
    .section-title {
      color: #3498db;
      font-size: 12px;
      margin: 10px 0 4px 0;
    }
    .state-block {
      background: #16213e;
      padding: 8px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry {
      white-space: pre-wrap;
      padding: 1px 0;
      word-break: break-all;
    }
    .log-entry.error { color: #e74c3c; }
    .log-entry.warn { color: #f39c12; }
    .log-entry.info { color: #e0e0e0; }
    button {
      background: #9b59b6;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      margin-right: 6px;
    }
    button:hover { background: #8e44ad; }
    .controls { margin-bottom: 10px; }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .setting label {
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      margin-left: 10px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #9b59b6;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }
    a {
      color: #3498db;
      text-decoration: none;
      font-size: 11px;
    }
    a:hover { text-decoration: underline; }
    .credit {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #2a2a4a;
      text-align: center;
      font-size: 10px;
      color: #888;
    }
    .credit a { color: #9b59b6; font-size: 10px; }
  </style>
</head>
<body>
  <h1>Stream Monitor Debug</h1>
  <div class="controls">
    <button id="refresh">Refresh</button>
    <button id="clear">Clear Log</button>
    <a href="#" id="open-full">Open in full tab</a>
  </div>
  <div class="section-title">— Settings —</div>
  <div class="setting">
    <label for="auto-mute">Auto-mute opened tabs</label>
    <div class="toggle">
      <input type="checkbox" id="auto-mute">
      <label class="slider" for="auto-mute"></label>
    </div>
  </div>
  <div class="section-title">— State —</div>
  <div id="state" class="state-block">Loading...</div>
  <div class="section-title">— Recent Log —</div>
  <div id="log">Loading...</div>

  <div class="credit">
    Created by <a href="https://www.twitch.tv/CaedVT" id="credit-link">CaedVT</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
